<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Muhammadiyah 2 Pekajangan — Portal Sekolah Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&family=Nunito:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#1B4332;--g2:#2D6A4F;--g3:#52B788;
  --gold:#D4AF37;--gold-l:#F4D03F;--gold-d:#A07810;
  --charcoal:#2F3E46;--red:#C0392B;--blue:#1A5276;--blue-m:#2D6A9F;
  --purple:#6B2FAA;--orange:#E67E22;
  --cream:#F8F9FA;--dark:#1A1A1A;--text:#2F3E46;--text2:#5D6D7E;
  --shadow:0 8px 32px rgba(47,62,70,.15);--radius:18px;--tr:.3s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}

body.dark{background:var(--charcoal);color:var(--cream)}
body.dark nav{background:rgba(47,62,70,.98)}
body.dark .feat-card,body.dark .app-card,body.dark .ekskul-item,body.dark .testi-card,body.dark .berita-card-sm,body.dark .berita-card-big{background:#232E34;border-color:var(--gold)}
body.dark .sec-title, body.dark .b-title, body.dark .feat-title, body.dark .app-card h3 {color:var(--gold)}
body.dark .modal{background:var(--charcoal);color:var(--cream)}
body.dark footer{background:#1A2328}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(27,67,50,.97);backdrop-filter:blur(16px);height:64px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-emblem{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:var(--g1);flex-shrink:0}
.nav-name{font-family:'Poppins',sans-serif;font-weight:800;font-size:.85rem;color:white;line-height:1.2}
.nav-loc{font-size:.64rem;color:rgba(255,255,255,.5)}
.nav-links{display:flex;gap:3px;list-style:none}
.nav-links a{color:rgba(255,255,255,.75);font-size:.78rem;font-weight:700;padding:6px 12px;border-radius:20px;transition:.2s;text-decoration:none;display:block}
.nav-links a:hover{background:var(--gold);color:var(--g1)}
.nav-r{display:flex;align-items:center;gap:8px}
.btn-dm{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer}
.hbg span{width:22px;height:2px;background:white;border-radius:2px;display:block}

/* HERO */
.hero{min-height:100vh;background:linear-gradient(135deg,#1B4332 0%,var(--charcoal) 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:80px 1.5rem 5rem;color:white}
.hero h1{font-family:'Poppins',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;margin-bottom:.6rem}
.hero h1 em{color:var(--gold-l);font-style:normal}

section{padding:4rem 1.5rem}
.container{max-width:1100px;margin:0 auto}
.sec-title{font-family:'Poppins',sans-serif;font-size:2rem;font-weight:800;color:var(--g1);margin-bottom:2rem;text-align:center}

/* GRID KONTEN */
.ekskul-grid, .guru-grid {display:grid; gap:1.3rem;}
.ekskul-grid {grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}
.guru-grid {grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
.ekskul-item, .guru-card {background:white; border-radius:var(--radius); padding:1.5rem; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.03);}
body.dark .ekskul-item, body.dark .guru-card {background:#232E34; color:white;}
.guru-avatar {width:70px; height:70px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:var(--cream);}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="#">
    <div class="nav-emblem">☪</div>
    <div><div class="nav-name">SD Muhammadiyah 2 Pekajangan</div><div class="nav-loc">Kedungwuni · Kab. Pekalongan</div></div>
  </a>
  <ul class="nav-links" id="nl">
    <li><a href="#ekskul">Ekskul</a></li>
    <li><a href="#guru">Guru</a></li>
  </ul>
  <div class="nav-r">
    <button class="btn-dm" id="dmBtn">🌙</button>
  </div>
</nav>

<section class="hero">
  <h1>SD Muhammadiyah 2<br><em>Pekajangan</em></h1>
  <p>Portal Sekolah Digital — Berilmu, Berakhlak, Berprestasi</p>
</section>
<!-- EKSKUL -->
<section id="ekskul" class="container">
  <h2 class="sec-title">Ekstrakurikuler Pilihan</h2>
  <div class="ekskul-grid" id="tEkskul">
    <!-- Data dari data.json akan otomatis masuk sini -->
  </div>
</section>

<!-- GURU -->
<section id="guru" class="container" style="background:rgba(0,0,0,0.02)">
  <h2 class="sec-title">Jajaran Guru & Staff</h2>
  <div class="guru-grid" id="tGuru">
    <!-- Data dari data.json akan otomatis masuk sini -->
  </div>
</section>

<footer style="background:var(--charcoal); padding:2rem; text-align:center; color:white;">
  <p>© 2026 SD Muhammadiyah 2 Pekajangan · Terhubung ke Database JSON</p>
</footer>

<script>
let dark=localStorage.getItem('dk')==='1';
function applyDk(){document.body.classList.toggle('dark',dark);document.getElementById('dmBtn').textContent=dark?'☀️':'🌙';}
applyDk();
document.getElementById('dmBtn').addEventListener('click',()=>{dark=!dark;localStorage.setItem('dk',dark?'1':'0');applyDk();});

// Otomatis Ambil Data dari data.json
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    // Render Ekskul
    const elEkskul = document.getElementById('tEkskul');
    if(data.ekskul && elEkskul) {
      elEkskul.innerHTML = data.ekskul.map(e => `
        <div class="ekskul-item">
          <div style="font-size:2.3rem; margin-bottom:8px;">${e.icon}</div>
          <div style="font-family:'Poppins',sans-serif; font-weight:800; font-size:0.9rem; color:var(--g1);">${e.nama}</div>
          <div style="font-size:0.75rem; color:var(--text2); margin-top:4px;">${e.hari}</div>
        </div>
      `).join('');
    }

    // Render Guru
    const elGuru = document.getElementById('tGuru');
    if(data.guru && elGuru) {
      elGuru.innerHTML = data.guru.map(g => `
        <div class="guru-card">
          <div class="guru-avatar" style="background:${g.warna || '#e8f5e9'}">${g.icon}</div>
          <div style="font-family:'Poppins',sans-serif; font-weight:800; font-size:0.88rem; margin-bottom:2px;">${g.nama}</div>
          <div style="font-size:0.75rem; color:var(--text2);">${g.jabatan}</div>
        </div>
      `).join('');
    }
  })
  .catch(err => console.log('Gagal memuat data json:', err));
</script>
</body>
</html>
